*{box-sizing:border-box;margin:0;padding:0}

.header{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 20px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.header-top{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.logo{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#a855f7);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px;flex-shrink:0}
.header h1{font-size:15px;font-weight:700;color:#1e293b}
.header p{font-size:11px;color:#94a3b8}
.badges{margin-left:auto;display:flex;gap:6px}
.badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:99px;border:1px solid}
.badge-indigo{background:#eef2ff;color:#4f46e5;border-color:#c7d2fe}
.badge-green{background:#f0fdf4;color:#16a34a;border-color:#bbf7d0}
.formula-bar{font-size:10px;color:#94a3b8;font-family:monospace;background:#f8fafc;border-radius:8px;padding:5px 10px;margin-bottom:8px}
.tabs{display:flex;gap:4px}
.tab{padding:5px 12px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#64748b;background:transparent;transition:.15s}
.tab.active{background:#4f46e5;color:#fff;box-shadow:0 1px 4px rgba(79,70,229,.4)}
.tab:hover:not(.active){background:#f1f5f9}
.main{max-width:1100px;margin:0 auto;padding:16px}
.section{display:none}.section.active{display:block}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #f1f5f9}
.kpi-label{font-size:11px;color:#94a3b8;font-weight:500;margin-bottom:4px}
.kpi-value{font-size:20px;font-weight:700;margin-bottom:2px}
.kpi-sub{font-size:10px;color:#94a3b8}
.kpi-formula{font-size:10px;color:#a5b4fc;font-family:monospace;margin-top:3px}
.section-title{font-size:12px;font-weight:700;color:#374151;margin-bottom:2px}
.section-sub{font-size:10px;color:#94a3b8;margin-bottom:12px}
.c-indigo{color:#4f46e5}.c-green{color:#16a34a}.c-amber{color:#d97706}.c-purple{color:#9333ea}.c-blue{color:#2563eb}.c-red{color:#dc2626}
.chart-wrap{width:100%;overflow:hidden}
svg text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
table{width:100%;border-collapse:collapse;font-size:11px}
th{padding:6px 8px;text-align:left;font-weight:600;color:#64748b;border-bottom:2px solid #f1f5f9;background:#f8fafc;white-space:nowrap}
td{padding:5px 8px;border-bottom:1px solid #f8fafc;white-space:nowrap}
tr:hover td{background:#f8fafc}
.chip{display:inline-block;padding:2px 6px;border-radius:6px;font-weight:600;font-size:11px}
.chip-green{background:#f0fdf4;color:#16a34a}
.chip-blue{background:#eef2ff;color:#4f46e5}
.chip-amber{background:#fffbeb;color:#d97706}
.chip-red{background:#fef2f2;color:#dc2626}
.filters{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px}
.filter-label{font-size:11px;font-weight:600;color:#64748b;margin-right:4px}
.ftag{padding:3px 10px;border-radius:99px;border:1px solid #e2e8f0;cursor:pointer;font-size:11px;font-weight:500;color:#94a3b8;background:#fff;transition:.15s}
.ftag.on{color:#fff;border-color:transparent}
.ftag:hover:not(.on){background:#f1f5f9}
.metric-btn{padding:3px 10px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:500;color:#64748b;background:#f1f5f9;transition:.15s}
.metric-btn.on{background:#4f46e5;color:#fff}
.info-box{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:8px 12px;font-size:11px;color:#92400e;margin-bottom:10px}
tfoot td{font-weight:700;background:#fffbeb;color:#92400e}
#tip{position:fixed;background:rgba(15,23,42,.92);color:#fff;font-size:11px;padding:6px 10px;border-radius:8px;pointer-events:none;opacity:0;transition:opacity .12s;z-index:9999;line-height:1.7;white-space:pre;box-shadow:0 3px 10px rgba(0,0,0,.25)}
</style>
</head>

function svgEl(tag,attrs,children=""){
  const a=Object.entries(attrs).map(([k,v])=>`${k}="${v}"`).join(" ");
  return `<${tag} ${a}>${children}</${tag}>`;
}

function barLineChart(data,{width=680,height=220,barKey,lineKey,barLabel,lineLabel,barColor="#6366f1",lineColor="#22c55e",lineMax,xKey="date",rotateLabels=false,xLabelFontSize=10,xTickFn=null,rotateBottom=90}={}){
  const P={top:28,right:56,bottom:rotateLabels?rotateBottom:28,left:52};
  const W=width-P.left-P.right, H=height-P.top-P.bottom;
  const barMax=Math.max(...data.map(d=>d[barKey]||0))*1.15;
  const lMax=lineMax||Math.max(...data.map(d=>d[lineKey]||0))*1.15||1;
  const bw=Math.min(40,Math.max(4,W/data.length*0.6));
  let bars="",lines="",dots="",xLabels="",yLeft="",yRight="";
  data.forEach((d,i)=>{
    const x=P.left+i*(W/data.length)+W/data.length/2;
    const bv=d[barKey]||0, lv=d[lineKey];
    const bh=(bv/barMax)*H;
    bars+=svgEl("rect",{x:x-bw/2,y:P.top+H-bh,width:bw,height:bh,fill:barColor,rx:2,opacity:.85,
      "data-tip":`${d[xKey]}: ${barLabel} ${bv}`});
    if(lv!=null){
      const ly=P.top+H-(lv/lMax)*H;
      if(i>0&&data[i-1][lineKey]!=null){
        const px=P.left+(i-1)*(W/data.length)+W/data.length/2;
        const py=P.top+H-(data[i-1][lineKey]/lMax)*H;
        lines+=svgEl("line",{x1:px,y1:py,x2:x,y2:ly,stroke:lineColor,"stroke-width":2});
      }
      dots+=svgEl("circle",{cx:x,cy:ly,r:3,fill:lineColor,"data-tip":`${d[xKey]}: ${lineLabel} ${lv}`});
    }
    if(rotateLabels){
      const ty=P.top+H+8;
      xLabels+=`<text x="${x}" y="${ty}" text-anchor="end" font-size="${xLabelFontSize}" fill="#64748b" transform="rotate(-40,${x},${ty})">${d[xKey]}</text>`;
    } else {
      const showTick=xTickFn?xTickFn(d,i,data):(i%4===0||i===data.length-1);
      if(showTick) xLabels+=svgEl("text",{x,y:height-6,"text-anchor":"middle","font-size":9,fill:"#94a3b8"},d[xKey]);
    }
  });
  // Y축 눈금
  for(let t=0;t<=4;t++){
    const y=P.top+H*(1-t/4);
    const v=Math.round(barMax*t/4);
    yLeft+=svgEl("text",{x:P.left-6,y:y+3,"text-anchor":"end","font-size":9,fill:"#94a3b8"},v>999?Math.round(v/10000)+"만":v);
    yLeft+=svgEl("line",{x1:P.left,y1:y,x2:P.left+W,y2:y,stroke:"#f3f4f6","stroke-width":1});
    const rv=(lMax*t/4).toFixed(2);
    yRight+=svgEl("text",{x:P.left+W+6,y:y+3,"text-anchor":"start","font-size":9,fill:lineColor},rv);
  }
  const legend=`<g transform="translate(${width/2-63},${P.top-12})">
    <rect x="0" y="-8" width="10" height="10" fill="${barColor}" rx="2"/><text x="14" y="1" font-size="10" fill="#374151">${barLabel}</text>
    <line x1="82" y1="-3" x2="94" y2="-3" stroke="${lineColor}" stroke-width="2"/><circle cx="88" cy="-3" r="3" fill="${lineColor}"/>
    <text x="98" y="1" font-size="10" fill="#374151">${lineLabel}</text>
  </g>`;
  return `<svg viewBox="0 0 ${width} ${height}" style="width:100%;height:auto">${yLeft}${yRight}${bars}${lines}${dots}${xLabels}${legend}</svg>`;
}

function areaChart(data,{width=340,height=180,key,label,color="#6366f1",unit="",xKey="date",yFmt=v=>v,showLabel=true,xTickFn=null}={}){
  const P={top:16,right:16,bottom:24,left:52};
  const W=width-P.left-P.right,H=height-P.top-P.bottom;
  const vals=data.map(d=>d[key]||0);
  const mx=Math.max(...vals)*1.15||1;
  const xStep=data.length>1?W/(data.length-1):0;
  const pts=data.map((d,i)=>{
    const x=data.length===1?P.left+W/2:P.left+i*xStep;
    const y=P.top+H-(((d[key]||0)/mx)*H);
    return `${x},${y}`;
  });
  const areaPath=`M ${pts[0]} L ${pts.join(" L ")} L ${P.left+W},${P.top+H} L ${P.left},${P.top+H} Z`;
  const linePath=`M ${pts[0]} L ${pts.join(" L ")}`;
  let xLbls="",yLbls="",dots="";
  data.forEach((d,i)=>{
    const showATick=xTickFn?xTickFn(d,i,data):(i%4===0||i===data.length-1);
    const cx=data.length===1?P.left+W/2:P.left+i*xStep;
    if(showATick) xLbls+=svgEl("text",{x:cx,y:height-6,"text-anchor":"middle","font-size":9,fill:"#94a3b8"},d[xKey]);
    const cy=P.top+H-(((d[key]||0)/mx)*H);
    dots+=svgEl("circle",{cx,cy,r:4,fill:color,stroke:"#fff","stroke-width":1.5,style:"cursor:pointer","data-tip":`${d[xKey]}\n${label}: ${yFmt(d[key]||0)}`});
  });
  for(let t=0;t<=3;t++){
    const y=P.top+H*(1-t/3);
    const v=mx*t/3;
    yLbls+=svgEl("text",{x:P.left-5,y:y+3,"text-anchor":"end","font-size":9,fill:"#94a3b8"},yFmt(v));
    yLbls+=svgEl("line",{x1:P.left,y1:y,x2:P.left+W,y2:y,stroke:"#f3f4f6","stroke-width":1});
  }
  const lid=`grad_${key}`;
  return `<svg viewBox="0 0 ${width} ${height}" style="width:100%;height:auto">
    <defs><linearGradient id="${lid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".25"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    ${yLbls}<path d="${areaPath}" fill="url(#${lid})"/><path d="${linePath}" fill="none" stroke="${color}" stroke-width="2"/>
    ${dots}${xLbls}
    ${showLabel?`<text x="${P.left}" y="${P.top-3}" font-size="10" fill="#374151">${label}</text>`:""}
  </svg>`;
}

function hBarChart(data,{width=520,height=280,key,label,color="#6366f1",fmtFn=v=>v,nameKey="ch",fontSize=9,barRatio=0.45}={}){
  const P={top:10,right:80,bottom:10,left:80};
  const W=width-P.left-P.right,H=height-P.top-P.bottom;
  const bh=Math.max(7,H/data.length*barRatio);
  const mx=Math.max(...data.map(d=>d[key]||0))*1.1||1;
  let bars="";
  data.forEach((d,i)=>{
    const y=P.top+i*(H/data.length)+(H/data.length-bh)/2;
    const bw=(d[key]||0)/mx*W;
    const ci=CHANNEL.findIndex(c=>c.ch===d[nameKey])||i;
    const col=Array.isArray(color)?COLORS[i%COLORS.length]:color;
    bars+=svgEl("rect",{x:P.left,y,width:Math.max(0,bw),height:bh,fill:col,rx:3,style:"cursor:pointer","data-tip":`${d[nameKey]}\n${label}: ${fmtFn(d[key])}`});
    bars+=svgEl("text",{x:P.left-5,y:y+bh/2+4,"text-anchor":"end","font-size":fontSize,fill:"#374151"},d[nameKey]);
    bars+=svgEl("text",{x:P.left+bw+5,y:y+bh/2+4,"font-size":fontSize,fill:"#374151"},fmtFn(d[key]));

function pieChart(data,{width=320,height=280,valueKey,nameKey,r=96,fmtFn=v=>v.toLocaleString(),colorFn=null}={}){
  const cx=width/2,cy=height/2;
  const total=data.reduce((s,d)=>s+(d[valueKey]||0),0);
  let angle=-Math.PI/2,slices="",labels="";
  data.forEach((d,i)=>{
    const v=d[valueKey]||0;
    const a=(v/total)*2*Math.PI;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    const x2=cx+r*Math.cos(angle+a),y2=cy+r*Math.sin(angle+a);
    const large=a>Math.PI?1:0;
    const pct=(v/total*100).toFixed(1);
    const col=colorFn?colorFn(d,i):COLORS[i%COLORS.length];
    slices+=svgEl("path",{d:`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z`,fill:col,stroke:"#fff","stroke-width":2,style:"cursor:pointer","data-tip":`${d[nameKey]}\n${fmtFn(v)} (${pct}%)`});
    const midA=angle+a/2,lx=cx+(r*0.65)*Math.cos(midA),ly=cy+(r*0.65)*Math.sin(midA);
    if(v/total>0.06) labels+=svgEl("text",{x:lx,y:ly,"text-anchor":"middle","dominant-baseline":"central","font-size":16,"font-weight":600,fill:"#fff"},`${Math.round(v/total*100)}%`);
    angle+=a;
  });
  return `<svg viewBox="0 0 ${width} ${height}" style="width:100%;height:auto">${slices}${labels}</svg>`;
}

// ────────── 탭 렌더 ──────────
function chipRoi(v){if(v==null)return"-";const c=v>=1.0?"chip-green":v>=0.6?"chip-blue":v>=0.3?"chip-amber":"chip-red";return`<span class="chip ${c}">${v}</span>`;}
function chipPct(v,hi=70,mid=60){if(v==null)return"-";const c=v>=hi?"c-green":v>=mid?"c-amber":"c-red";return`<span class="${c}" style="font-weight:600">${v}%</span>`;}

    {label:"총 정기금액",value:`₩${(KPI.총정기금액/10000).toFixed(1)}만`,sub:"SVC 채널 포함",cls:"c-purple",icon:"💜",formula:"정기후원 월 납입금액 합산"},

let selCh=new Set();
let metricKey="정기건수";
function renderChannel(){
  const metrics=["정기건수","정기금액","CPR","ROI","응대율","콜전환율","정기전환율"];
  const fmtMetric=(k,v)=>k==="ROI"?v.toFixed(2):k==="정기건수"?v+"건":k==="정기금액"?fmtJm(v):k==="CPR"?fmtK(v):(v+"%");
  const filters=`<div class="card" style="margin-bottom:10px">
    <div class="filters">
      <span class="filter-label">매체 선택</span>
      ${CHANNEL.map((c,i)=>`<span class="ftag ${selCh.has(c.ch)?"on":""}" style="${selCh.has(c.ch)?`background:${COLORS[i]}`:""}" onclick="toggleCh('${c.ch}',${i})">${c.ch}</span>`).join("")}
    </div>
  </div>`;
  const metricBtns=`<div class="card" style="margin-bottom:10px">
    <div class="filters">
      <span class="filter-label">비교 지표</span>
      ${metrics.map(m=>`<button class="metric-btn ${metricKey===m?"on":""}" onclick="setMetric('${m}')">${m}</button>`).join("")}
    </div>
  </div>`;
  const active=[...CHANNEL].filter(c=>selCh.has(c.ch)).sort((a,b)=>b.ROI-a.ROI);
  const chartData=[...active].sort((a,b)=>b[metricKey]-a[metricKey]);
  const barH=`<div class="card" style="margin-bottom:16px">
    <div class="section-title">📡 매체별 ${metricKey}</div>
    <div class="chart-wrap">${hBarChart(chartData,{key:metricKey,label:metricKey,color:true,height:130,fontSize:8,barRatio:0.28,fmtFn:v=>fmtMetric(metricKey,v)})}</div>
  </div>`;
  const cards=`<div class="grid2" style="margin-bottom:16px">${active.map((c,i)=>{
    const ci=CHANNEL.findIndex(x=>x.ch===c.ch);
    const roiC=c.ROI>=1.0?"chip-green":c.ROI>=0.6?"chip-blue":c.ROI>=0.3?"chip-amber":"chip-red";
    return`<div class="card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span style="width:10px;height:10px;background:${COLORS[ci%10]};border-radius:50%;display:inline-block"></span>
        <b style="font-size:13px">${c.ch}</b>
        <span class="chip ${roiC}" style="margin-left:auto">ROI ${c.ROI}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">
        ${[["인입콜",c.인입콜+"건"],["응대율",c.응대율+"%"],["정기건수",c.정기건수+"건"],
           ["정기금액",fmtJm(c.정기금액)],["광고비",fmtM(c.광고비)],["CPR",fmtK(c.CPR)]
          ].map(([k,v])=>`<div style="background:#f8fafc;border-radius:8px;padding:6px">
          <div style="font-size:10px;color:#94a3b8">${k}</div>
          <div style="font-weight:700;font-size:12px">${v}</div>
        </div>`).join("")}
      </div>
    </div>`;
  }).join("")}</div>`;
  const otherRows=OTHER.map((r,i)=>`<tr style="${i%2?"":"background:#fafafa"}">
    <td><b>${r.ch}</b></td><td>${r.유효일수}일</td>
    <td style="color:#2563eb;font-weight:600">${r.인입콜}</td><td>${r.응대콜}</td>
    <td>${chipPct(r.응대율,65,50)}</td>
    <td style="color:#4f46e5;font-weight:700">${r.정기건수}</td>
    <td>${r.정기금액>0?fmtJm(r.정기금액):"-"}</td>
    <td style="color:#d1d5db">—</td><td style="color:#d1d5db">—</td><td style="color:#d1d5db">—</td>
  </tr>`).join("");
  const otherSum={ic:OTHER.reduce((s,r)=>s+r.인입콜,0),rc:OTHER.reduce((s,r)=>s+r.응대콜,0),jg:OTHER.reduce((s,r)=>s+r.정기건수,0),jm:OTHER.reduce((s,r)=>s+r.정기금액,0)};
  const otherTbl=`<div class="card">
    <div class="section-title" style="margin-bottom:6px">📋 SVC·기타 채널 (별도 집계)</div>
    <div class="info-box" style="margin-bottom:8px">⚠️ 광고비 없는 채널 — ROI·CPR·CPA 산출 불가. 총 KPI(인입콜·정기건수·후원금)에는 포함됩니다.</div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>채널명</th><th>유효일수</th><th>인입콜</th><th>응대콜</th><th>응대율</th><th>정기건수</th><th>정기금액</th><th>ROI</th><th>CPR</th><th>CPA</th></tr></thead>
      <tbody>${otherRows}</tbody>
      <tfoot><tr><td colspan="2">합계</td><td>${otherSum.ic}</td><td>${otherSum.rc}</td><td>${(otherSum.rc/otherSum.ic*100).toFixed(1)}%</td><td>${otherSum.jg}</td><td>${fmtW(otherSum.jm)}</td><td colspan="3"></td></tr></tfoot>
    </table></div>
  </div>`;
  document.getElementById("channel").innerHTML=filters+metricBtns+barH+cards+otherTbl;
}

      <td>${(m.광고비/1000000).toFixed(1)}M</td>
      <td><span class="chip ${rc}">${m.ROI}</span></td>
      <td>${(m.CPR/10000).toFixed(0)}만</td>
      <td>${m.CPA>2000000?"—":(m.CPA/10000).toFixed(0)+"만"}</td>
    </tr>`;
  }).join("");
  const tbl=`<div class="card" style="margin-top:16px">
    <div class="section-title" style="margin-bottom:8px">📋 소재별 전체 성과</div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>소재명</th><th>인입콜</th><th>응대율</th><th>정기건수</th><th>정기금액</th><th>광고비</th><th>ROI</th><th>CPR</th><th>CPA</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>`;
  document.getElementById("material").innerHTML=chart+`<div class="grid2">${c1}${c2}</div>`+tbl;

// ────────── 탭 전환 ──────────
function showTab(id,el){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  el.classList.add("active");
}
function toggleCh(ch,idx){
  if(selCh.has(ch)){if(selCh.size>1)selCh.delete(ch);}else selCh.add(ch);
  renderChannel();
}
function setMetric(k){metricKey=k;renderChannel();}

// ────────── 월별 전환 ──────────
let activeMonth="";
function loadMonth(m){
  const d=MONTHS_DATA[m];
  if(!d)return;
  activeMonth=m;
  DAILY=d.daily;CHANNEL=d.channel;OTHER=d.other;MATERIAL=d.material;KPI=d.kpi;
  selCh=new Set(CHANNEL.map(c=>c.ch));
  // 헤더 날짜
  const [y,mo]=m.split("-");
  const first=DAILY[0]?.date||"";
  const last=DAILY[DAILY.length-1]?.date||"";
  document.getElementById("hdr-date").textContent=`${y}년 ${parseInt(mo)}월 (${first}~${last}) · 실제 운영 데이터`;
  // 헤더 배지
  document.getElementById("hdr-roi").textContent="ROI "+KPI.ROI;
  document.getElementById("hdr-jg").textContent="정기금액 "+(KPI.총정기금액/10000).toFixed(1)+"만";
  // 월 버튼 활성화
  document.querySelectorAll("#month-btns .ftag").forEach(b=>{
    b.classList.toggle("active",b.dataset.m===m);
  });
  renderOverview();renderChannel();renderMaterial();
}

// ────────── 초기화 ──────────
document.getElementById("formula-bar").textContent="ROI=정기금액×12÷광고비  |  CPR=광고비÷인입콜  |  CPA=광고비÷(정기금액÷20,000)";
// 월 버튼 생성
const monthBtns=document.getElementById("month-btns");
Object.keys(MONTHS_DATA).sort().forEach(m=>{
  const [y,mo]=m.split("-");
  const d=MONTHS_DATA[m];
  const lastDate=d.daily[d.daily.length-1]?.date||"";
  const lastDay=lastDate.split("/")[1]||"";
  const btn=document.createElement("button");
  btn.className="ftag";btn.dataset.m=m;
  btn.textContent=parseInt(mo)+"월 ~"+lastDay+"일";
  btn.onclick=()=>loadMonth(m);
  monthBtns.appendChild(btn);
});
const latestMonth=Object.keys(MONTHS_DATA).sort().pop();
loadMonth(latestMonth);

// ────────── 툴팁 ──────────
(function(){
  const tip=document.createElement('div');
  tip.id='tip';
  document.body.appendChild(tip);
  document.addEventListener('mouseover',e=>{
    const t=e.target.closest('[data-tip]');
    if(t){tip.textContent=t.getAttribute('data-tip');tip.style.opacity='1';}
    else tip.style.opacity='0';
  });
  document.addEventListener('mousemove',e=>{
    const vw=window.innerWidth,vh=window.innerHeight;
    const tw=tip.offsetWidth+20,th=tip.offsetHeight+20;
    tip.style.left=(e.clientX+tw>vw?e.clientX-tw+6:e.clientX+14)+'px';
    tip.style.top=(e.clientY+th>vh?e.clientY-th+6:e.clientY-36)+'px';
  });
})();
</script>
